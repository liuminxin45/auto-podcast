# Auto-Podcast 配置示例
# 复制此文件为 config.yaml 并根据需要修改

fetch:
  sources:
    - type: rss
      url: "https://hnrss.org/frontpage"
    - type: rss
      url: "https://www.reddit.com/r/technology/.rss"
  max_items_per_source: 10
  timeout: 30

preprocess:
  min_content_length: 100
  max_content_length: 50000
  remove_duplicates: true
  similarity_threshold: 0.85

research:
  enable_web_search: false
  max_search_results: 5
  llm_model: "gpt-4o-mini"
  api_key: ""           # 留空则 fallback 到环境变量 OPENAI_API_KEY
  api_base: ""          # 留空则 fallback 到环境变量 OPENAI_API_BASE
  temperature: 0.5

topic_selection:
  min_cluster_size: 3
  max_topics: 1
  use_llm_scoring: true
  llm_model: "gpt-4o-mini"
  api_key: ""
  api_base: ""
  temperature: 0.3

script:
  llm_model: "gpt-4o"
  api_key: ""
  api_base: ""
  temperature: 0.7
  target_duration_minutes: 15
  dialogue_style: "conversational"
  num_hosts: 2

stages:
  words_per_minute: 150
  max_segment_duration: 120

tts:
  engine: "edge-tts"
  voice_mapping:
    主持人A: "zh-CN-XiaoxiaoNeural"
    主持人B: "zh-CN-YunxiNeural"
  default_voice: "zh-CN-XiaoxiaoNeural"
  output_dir: "out/audio_segments"
  rate: "+0%"
  volume: "+0%"

audio_postprocess:
  output_dir: "out/episodes"
  output_format: "mp3"
  normalize_loudness: true
  target_loudness: -16.0
  add_bgm: false

assets:
  output_dir: "out/assets"
  generate_cover: true
  cover_size: [1400, 1400]

store:
  storage_type: "local"
  local_base_dir: "out/published"
  generate_metadata: true

publish:
  rss_output_dir: "out/rss"
  podcast_title: "AI 科技播客"
  podcast_description: "AI 自动生成的科技播客节目"
  podcast_author: "Auto-Podcast"
  podcast_language: "zh-CN"
  podcast_category: "Technology"

subtitles:
  enabled: false
